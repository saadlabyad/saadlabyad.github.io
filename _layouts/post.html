<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} — Saad Labyad</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <script>
    MathJax = {
        tex: {
            inlineMath: [['$', '$'], ['\\(', '\\)']],
            displayMath: [['$$', '$$'], ['\\[', '\\]']],
            processEscapes: true,
            tags: 'ams'
        },
        options: {
            skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
        }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>

<header class="page-header" role="banner">
    <nav>
        <a href="https://saadlabyad.github.io/">
            <img src="/assets/img/home-icon.png" alt="Home" class="home-icon">
        </a>
        <h1 class="project-name" style="margin: 0; flex: 1;">Blog</h1>
        <ul class="nav-links">
            <li><a href="/files/saad_labyad_cv.pdf">CV</a></li>
            <li><a href="/projects.html">Projects</a></li>
            <li><a href="/publications.html">Publications</a></li>
            <li><a href="/teaching.html">Teaching</a></li>
            <li><a href="/posts/">Blog</a></li>
        </ul>
    </nav>
</header>

<main id="content" class="main-content" role="main">

    <div class="post-header">
        <span class="post-category-badge post-category-badge--{{ page.category }}">
            {{ page.category | capitalize }}
        </span>
        <h1 class="post-title">{{ page.title }}</h1>
        <p class="post-meta">{{ page.date | date: "%-d %B %Y" }}</p>
    </div>

    <div class="post-content">
        {{ content }}
    </div>

    <div class="post-back">
        <a href="/posts/">← Back to Blog</a>
    </div>

</main>

<footer class="site-footer">
    <span class="site-footer-credits">This page was generated by <a href="https://pages.github.com">GitHub Pages</a>.</span>
</footer>

</body>
</html>
